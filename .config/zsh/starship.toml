"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = "$directory$git_branch$git_status$character"
right_format = "$ruby${custom.rails}$nodejs$golang"
# format = "$directory$git_branch$git_status$character$fill$ruby${custom.rails}$nodejs$golanglinebreak$character"

command_timeout = 1000

# [os]
# disabled = false
# format = "[$symbol](#blue) "
#
# [os.symbols]
# Ubuntu  = "󰕈"
# Arch    = "󰣇"
# Macos   = ""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[✗](bold red)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
repo_root_style = "bold cyan"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = ""
format = "[$symbol $branch](bold purple) "

[git_status]
format = "($ahead_behind$staged$modified$untracked$deleted$conflicted)"
ahead = "[⇡$count ](bold cyan)"
behind = "[⇣$count ](bold cyan)"
diverged = "[⇡$ahead_count⇣$behind_count ](bold cyan)"
staged = "[+$count ](bold green)"
modified = "[●$count ](bold yellow)"
untracked = "[?$count ](bold white)"
deleted = "[✘$count ](bold red)"
conflicted = "[⚡$count ](bold red)"

[fill]
symbol = " "

[golang]
symbol = ""
format = "[$symbol $version]($style) "

[ruby]
format = "[$symbol $version]($style) "

# [dart]
# format = "[$symbol $version]($style) "

[custom.rails]
format = "[🔴 Rails $output](bold red) "
command = "rg -o '^    rails [(][0-9.]+[)]' Gemfile.lock | rg -o '[0-9.]+'"
detect_files = ["Gemfile", "Gemfile.lock"]
when = "test -f Gemfile.lock"
